method: grid

parameters:
  construction.time_window_size:
    values: [5.0, 10.0]
  training.lr:
    values: [0.001, 0.0003, 0.0001]
  training.node_hid_dim:
    values: [128, 256]
  training.node_out_dim:
    values: [-1]
  training.encoder.dropout:
    values: [0.1, 0.3]
  training.encoder.hyperbolic_temporal.window_size:
    values: [2, 3]
  training.encoder.hyperbolic_temporal.htc_weight:
    values: [0.0, 0.001, 0.005]
  training.encoder.hyperbolic_temporal.curvature:
    values: [0.5, 1.0]
  training.encoder.hyperbolic_temporal.attention_temperature:
    values: [1.0]
